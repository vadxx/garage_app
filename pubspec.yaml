name: garage_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  
  flutter_localizations:
    sdk: flutter
  slang: ^4.15.0
  slang_flutter: ^4.8.0

  path: ^1.9.1
  path_provider: ^2.1.5
  go_router: ^14.0.0
  flutter_riverpod: ^2.6.1

  backend: # local
    path: packages/backend

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  windows:
    generate: true
  image_path: "app_icon.png"

flutter:
  uses-material-design: true
